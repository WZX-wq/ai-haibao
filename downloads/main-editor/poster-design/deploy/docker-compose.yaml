services:
  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.api
      args:
        REGISTRY_PREFIX: ${DOCKER_HUB_MIRROR:-docker.io}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://mirrors.cloud.tencent.com/npm/}
        APT_MIRROR_ROOT: ${APT_MIRROR_ROOT:-http://deb.debian.org/debian}
        APT_SECURITY_MIRROR_ROOT: ${APT_SECURITY_MIRROR_ROOT:-http://deb.debian.org/debian-security}
        CHROMIUM_PACKAGE: ${CHROMIUM_PACKAGE:-chromium-headless-shell}
        INSTALL_CHROMIUM: ${INSTALL_CHROMIUM:-1}
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "7001"
      FILE_STORAGE_PATH: /app/static/
      PUPPETEER_EXECUTABLE_PATH: ${PUPPETEER_EXECUTABLE_PATH:-/usr/bin/chromium-headless-shell}
      PUPPETEER_PAGE_BASE_URL: http://web
    volumes:
      - poster_api_static:/app/static
    restart: unless-stopped
    networks:
      - poster_net

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.web
      args:
        REGISTRY_PREFIX: ${DOCKER_HUB_MIRROR:-docker.io}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://mirrors.cloud.tencent.com/npm/}
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_SCREEN_URL: ${VITE_SCREEN_URL:-}
    ports:
      - "${HTTP_PUBLISH_PORT:-8080}:80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - poster_net

volumes:
  poster_api_static:

networks:
  poster_net:
    driver: bridge
