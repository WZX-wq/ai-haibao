server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 100m;

    # Frontend static assets benefit from gzip, but image/screenshot payloads stay
    # uncompressed to avoid upstream/content-length mismatch on binary responses.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/rss+xml
        image/svg+xml
        application/wasm
        font/ttf
        font/otf
        application/vnd.ms-fontobject;

    # Official nginx:alpine image does not ship with brotli module by default.
    # Keep brotli disabled here unless the image is rebuilt with ngx_brotli.

    sendfile on;
    etag on;

    # 鲲穹 OAuth 回调为 Vue history 路由；^~ 优先于正则 location，避免被其它规则误伤
    location ^~ /oauth/ {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location ^~ /assets/ {
        try_files $uri =404;
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # 须与 service/src/control/api.ts 前缀一致（含 usage 下载配额等）
    # 截图接口 Puppeteer 较慢，须与 service 内截图超时（约 180s）一致，避免外层先 502
    location ~ ^/api/(screenshots|printscreen) {
        proxy_pass http://api:7001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Accept-Encoding "";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffering off;
        add_header Cache-Control "no-store, no-transform" always;
    }

    location ~ ^/(api|design|auth|admin|ai|usage)(/|$) {
        proxy_pass http://api:7001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 32k;
        proxy_buffers 16 32k;
        proxy_busy_buffers_size 128k;
        proxy_temp_file_write_size 128k;
    }

    location /static/ {
        proxy_pass http://api:7001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_buffering on;
        proxy_buffer_size 64k;
        proxy_buffers 16 64k;
        proxy_busy_buffers_size 256k;
        proxy_temp_file_write_size 256k;
    }

    location ~* \.(?:png|jpe?g|gif|webp|svg|ico)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        add_header Cache-Control "no-transform" always;
    }
}
